<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'JetBrains Mono', monospace" font-size="26">
  <rect width="1200" height="750" fill="#081633"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1c44" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#06102a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <g>
    <text x="40" y="70" fill="#9fb4ff">&lt;!-- product-grid --&gt;</text>
    <text x="40" y="130" fill="#5ee68a">&lt;section <tspan fill="#ffc14d">class</tspan>=<tspan fill="#fff">"products"</tspan>&gt;</text>
    <text x="80" y="190" fill="#5ee68a">&lt;article <tspan fill="#ffc14d">class</tspan>=<tspan fill="#5eb6ff">"card"</tspan>&gt;</text>
    <text x="120" y="250" fill="#5ee68a">&lt;img <tspan fill="#ffc14d">src</tspan>=<tspan fill="#fff">"/shoes/comfy.jpg"</tspan>&gt;</text>
    <text x="120" y="310" fill="#5eb6ff">&lt;h3&gt;<tspan fill="#fff">Comfy Leather</tspan>&lt;/h3&gt;</text>
    <text x="120" y="370" fill="#5ee68a">&lt;span <tspan fill="#ffc14d">class</tspan>=<tspan fill="#5eb6ff">"price"</tspan>&gt;<tspan fill="#fff">129 €</tspan>&lt;/span&gt;</text>
    <text x="120" y="430" fill="#5ee68a">&lt;button&gt;<tspan fill="#fff">Ajouter au panier</tspan>&lt;/button&gt;</text>
    <text x="80" y="490" fill="#5ee68a">&lt;/article&gt;</text>
    <text x="80" y="550" fill="#5ee68a">&lt;article <tspan fill="#ffc14d">class</tspan>=<tspan fill="#5eb6ff">"card"</tspan>&gt; … &lt;/article&gt;</text>
    <text x="80" y="610" fill="#5ee68a">&lt;article <tspan fill="#ffc14d">class</tspan>=<tspan fill="#5eb6ff">"card"</tspan>&gt; … &lt;/article&gt;</text>
    <text x="40" y="670" fill="#5ee68a">&lt;/section&gt;</text>
  </g>
</svg>
